<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieTailor</title>

    <style>
      * { box-sizing: border-box; }

      :root {
        --bento-glow-rgb: 150, 110, 70;
        --bento-bg: #1a120c;
        --bento-border: #3b2a1f;
      }

      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: #000;
        color: #fff;
      }

      .sticky-progress-wrapper {
        position: sticky;
        top: 0;
        z-index: 999;
        width: 100%;
        background: rgba(18, 12, 8, 0.88);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(199, 167, 122, 0.22);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.24);
      }

      .sticky-progress-inner {
        max-width: 1460px;
        margin: 0 auto;
        padding: 10px 48px 12px;
      }

      .sticky-progress-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 18px;
        margin-bottom: 8px;
        font-size: 0.86rem;
        letter-spacing: 0.8px;
        color: rgba(245, 230, 211, 0.82);
      }

      .sticky-progress-meta strong {
        color: #fff4e6;
        font-weight: 600;
      }

      .sticky-progress-track {
        width: 100%;
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.15);
        overflow: hidden;
      }

      .sticky-progress-track .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #c7a77a, #f8f8ff);
        border-top-right-radius: 12px;
        border-bottom-right-radius: 12px;
        transition: width 0.4s ease;
      }

      .hero {
        position: relative;
        isolation: isolate;
        min-height: 50vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        text-align: center;
        padding: 92px 24px 40px;
        gap: 12px;
        overflow: hidden;
      }

      .hero::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.25)),
          url(https://i.postimg.cc/nL3RGjhj/hatteruj-novosz.png);
        background-size: cover;
        background-position: center;
        opacity: 0.6;
        z-index: -2;
      }

      .hero::after { display: none; }

      .shiny-text {
        margin: 0;
        font-size: clamp(3rem, 6vw, 5.5rem);
        font-weight: 700;
        background: linear-gradient(90deg, #ffffff 0%, #d1d1d1 50%, #ffffff 100%);
        background-size: 200% auto;
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        animation: shine 3s linear infinite;
        letter-spacing: 3px;
        line-height: 1.05;
      }

      .subtitle {
        margin: 0.9rem 0 0 0;
        font-size: clamp(1.75rem, 3.5vw, 2.6rem);
        font-weight: 600;
        line-height: 1.2;
      }

      .gradient-text {
        background: linear-gradient(90deg, #9994b0, #c9c8bf);
        background-size: 200% 200%;
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        animation: gradient-flow 8s ease-in-out infinite alternate;
      }

      @keyframes gradient-flow {
        0% { background-position: 0% 50%; }
        100% { background-position: 100% 50%; }
      }

      @keyframes shine {
        to { background-position: 200% center; }
      }

      .form-section {
        position: relative;
        padding: 80px 24px;
        color: #2b2b2b;
        background:
          repeating-linear-gradient(
            90deg,
            rgba(0, 0, 0, 0.015) 0px,
            rgba(0, 0, 0, 0.015) 1px,
            transparent 1px,
            transparent 6px
          ),
          repeating-linear-gradient(
            0deg,
            rgba(0, 0, 0, 0.02) 0px,
            rgba(0, 0, 0, 0.02) 1px,
            transparent 1px,
            transparent 6px
          ),
          linear-gradient(180deg, #f5f1ea, #ebe5dc);
      }

      .form-section::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at 50% 0%, rgba(0, 0, 0, 0.05), transparent 60%);
        opacity: 0.6;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 24px;
        position: relative;
        z-index: 1;
      }

      .layout-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 56px;
      }

      .profile-intro {
        width: min(100%, 520px);
        display: grid;
        gap: 24px;
        flex: 0 0 auto;
      }

      .animated-block {
        background: linear-gradient(180deg, #ffffff 0%, #f7f3ee 100%);
        padding: 26px;
        border-radius: 16px;
        border: 1px solid rgba(0, 0, 0, 0.06);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
        transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
      }

      .animated-block:hover {
        transform: translateY(-6px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.14);
        border-color: rgba(43, 29, 20, 0.14);
      }

      label {
        display: block;
        font-weight: 600;
        font-size: 0.98rem;
        letter-spacing: 0.2px;
        color: #2b2119;
      }

      .input-style {
        width: 100%;
        padding: 14px 14px;
        border-radius: 10px;
        border: 1px solid rgba(43, 29, 20, 0.14);
        margin-top: 8px;
        transition: all 0.3s ease;
        font-size: 1rem;
        color: #2b2b2b;
        background: rgba(255, 255, 255, 0.78);
      }

      .input-style:focus {
        outline: none;
        border-color: rgba(43, 29, 20, 0.45);
        box-shadow: 0 0 0 3px rgba(199, 167, 122, 0.15);
        background: #fff;
      }

      .triple-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }

      .upload-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        width: 100%;
      }

      .upload-wrap {
        display: flex;
        justify-content: center;
        margin-top: 24px;
        width: 100%;
      }

      .folder-upload {
        background: linear-gradient(180deg, #2f2016 0%, #24180f 100%);
        color: #f5e6d3;
        padding: 14px 0;
        border-radius: 14px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 500;
        border: 1px solid rgba(199, 167, 122, 0.35);
        display: block;
        width: 100%;
        text-align: center;
        white-space: nowrap;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.1);
      }

      .folder-upload:hover {
        transform: translateY(-3px);
        background: linear-gradient(180deg, #3a2618 0%, #2b1d14 100%);
        box-shadow: 0 16px 30px rgba(0, 0, 0, 0.14);
      }

      .filename {
        text-align: center;
        margin-top: 6px;
        font-size: 0.92rem;
        color: #5c5247;
        font-weight: 500;
      }

      .centered-file-name { text-align: center; }

      .cta-side {
        flex: 1;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        padding-right: 48px;
      }

      .star-button-link { text-decoration: none; }

      .star-button {
        background: linear-gradient(180deg, #2f2016 0%, #24180f 100%);
        color: #f5e6d3;
        padding: 16px 30px;
        border-radius: 14px;
        border: 1px solid rgba(199, 167, 122, 0.35);
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 500;
        font-size: 16px;
        letter-spacing: 0.5px;
        min-width: 240px;
        text-align: center;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.14);
      }

      .star-button:hover {
        background: linear-gradient(180deg, #3a2618 0%, #2b1d14 100%);
        transform: translateY(-4px) scale(1.02);
        box-shadow: 0 18px 34px rgba(0, 0, 0, 0.18);
      }

      @media (max-width: 900px) {
        .layout-row {
          flex-direction: column;
          align-items: stretch;
          gap: 40px;
        }

        .profile-intro { width: 100%; }

        .cta-side {
          padding-right: 0;
          justify-content: center;
        }
      }

      @media (max-width: 768px) {
        .sticky-progress-inner {
          padding: 9px 18px 11px;
        }

        .sticky-progress-meta {
          flex-direction: column;
          align-items: flex-start;
          gap: 4px;
          font-size: 0.76rem;
        }

        .sticky-progress-track {
          height: 7px;
        }

        .hero {
          min-height: 50vh;
          padding: 72px 20px 36px;
          gap: 10px;
        }

        .container { padding: 0 18px; }

        .animated-block { padding: 22px; }

        .triple-row,
        .upload-row { grid-template-columns: 1fr; }

        .star-button,
        .star-button-link { width: 100%; }
      }
    </style>
  </head>

  <body>
    <div class="sticky-progress-wrapper">
      <div class="sticky-progress-inner">
        <div class="sticky-progress-meta">
          <strong id="progressStepText">1. lépés / 12</strong>
          <span id="progressStepLabel">Név megadása</span>
        </div>

        <div class="sticky-progress-track">
          <div class="progress-bar" id="stickyFormProgress"></div>
        </div>
      </div>
    </div>

    <main>
      <section class="hero">
        <h1 class="shiny-text">MovieTailor</h1>
        <p class="subtitle gradient-text">Fedezd fel a saját vizuális stílusodat.</p>
      </section>

      <section class="form-section">
        <div class="container layout-row">
          <div class="profile-intro">
            <div class="animated-block">
              <label for="name">Név:</label>
              <input id="name" type="text" class="input-style" />
            </div>

            <div class="animated-block">
              <label for="email">E-mail cím:</label>
              <input id="email" type="email" class="input-style" />
            </div>

            <div class="triple-row">
              <div class="animated-block">
                <label for="age">Életkor:</label>
                <select id="age" class="input-style">
                  <option value="">Válasszon</option>
                  <option>20-35 év</option>
                  <option>36-50 év</option>
                  <option>50+</option>
                </select>
              </div>

              <div class="animated-block">
                <label for="weight">Testsúly:</label>
                <input id="weight" type="number" class="input-style" />
              </div>

              <div class="animated-block">
                <label for="height">Magasság:</label>
                <input id="height" type="number" class="input-style" />
              </div>
            </div>

            <div class="upload-row">
              <div></div>
              <div class="upload-wrap">
                <label class="folder-upload" for="portraitInput">
                  <span>Portré feltöltése</span>
                </label>
                <input id="portraitInput" type="file" hidden />
              </div>
              <div></div>
            </div>

            <p class="filename centered-file-name" id="fileNameText" hidden></p>
          </div>

          <div class="cta-side">
            <a href="step2.html" class="star-button-link" id="goToStep2">
              <button class="star-button" type="button">Kérem az elemzést</button>
            </a>
          </div>
        </div>
      </section>
    </main>

    <script>
      const TOTAL_STEPS = 12;

      const progressBar = document.getElementById('stickyFormProgress');
      const progressStepText = document.getElementById('progressStepText');
      const progressStepLabel = document.getElementById('progressStepLabel');

      const portraitInput = document.getElementById('portraitInput');
      const fileNameText = document.getElementById('fileNameText');
      const goToStep2 = document.getElementById('goToStep2');

      const fields = {
        name: document.getElementById('name'),
        email: document.getElementById('email'),
        age: document.getElementById('age'),
        weight: document.getElementById('weight'),
        height: document.getElementById('height')
      };

      const indexProgressSteps = [
        {
          key: 'form_name',
          label: 'Név megadása',
          isCompleted: () => fields.name.value.trim() !== ''
        },
        {
          key: 'form_email',
          label: 'E-mail cím megadása',
          isCompleted: () => fields.email.value.trim() !== ''
        },
        {
          key: 'form_age',
          label: 'Életkor kiválasztása',
          isCompleted: () => fields.age.value.trim() !== ''
        },
        {
          key: 'form_weight',
          label: 'Testsúly megadása',
          isCompleted: () => fields.weight.value.trim() !== ''
        },
        {
          key: 'form_height',
          label: 'Magasság megadása',
          isCompleted: () => fields.height.value.trim() !== ''
        },
        {
          key: 'form_portrait',
          label: 'Portré feltöltése',
          isCompleted: () => sessionStorage.getItem('form_portrait') === '1'
        }
      ];

      if (!sessionStorage.getItem('flow_started')) {
        sessionStorage.clear();
        sessionStorage.setItem('flow_started', '1');
      }

      function restoreIndexData() {
        fields.name.value = sessionStorage.getItem('form_name') || '';
        fields.email.value = sessionStorage.getItem('form_email') || '';
        fields.age.value = sessionStorage.getItem('form_age') || '';
        fields.weight.value = sessionStorage.getItem('form_weight') || '';
        fields.height.value = sessionStorage.getItem('form_height') || '';

        const portraitName = sessionStorage.getItem('form_portrait_name') || '';

        if (portraitName) {
          fileNameText.hidden = false;
          fileNameText.textContent = `Feltöltve: ${portraitName}`;
        }
      }

      function getCompletedIndexSteps() {
        return indexProgressSteps.filter((step) => step.isCompleted()).length;
      }

      function getCurrentIndexLabel() {
        const firstIncompleteStep = indexProgressSteps.find((step) => !step.isCompleted());
        return firstIncompleteStep ? firstIncompleteStep.label : 'Alapadatok kitöltve';
      }

      function saveIndexProgress() {
        sessionStorage.setItem('form_name', fields.name.value.trim());
        sessionStorage.setItem('form_email', fields.email.value.trim());
        sessionStorage.setItem('form_age', fields.age.value.trim());
        sessionStorage.setItem('form_weight', fields.weight.value.trim());
        sessionStorage.setItem('form_height', fields.height.value.trim());

        const completedIndexSteps = getCompletedIndexSteps();

        sessionStorage.setItem('progress_index_completed', String(completedIndexSteps));

        const choiceStepsCompleted = Number(
          sessionStorage.getItem('progress_step_completed_total') || 0
        );

        const completedTotal = completedIndexSteps + choiceStepsCompleted;
        const currentStepNumber = Math.min(completedTotal + 1, TOTAL_STEPS);
        const progressWidth = (completedTotal / TOTAL_STEPS) * 100;

        progressBar.style.width = `${progressWidth}%`;
        progressStepText.textContent = `${currentStepNumber}. lépés / ${TOTAL_STEPS}`;
        progressStepLabel.textContent = getCurrentIndexLabel();
      }

      portraitInput.addEventListener('change', (event) => {
        const file = event.target.files && event.target.files[0];

        if (file) {
          fileNameText.hidden = false;
          fileNameText.textContent = `Feltöltve: ${file.name}`;
          sessionStorage.setItem('form_portrait', '1');
          sessionStorage.setItem('form_portrait_name', file.name);
        } else {
          fileNameText.hidden = true;
          fileNameText.textContent = '';
          sessionStorage.setItem('form_portrait', '0');
          sessionStorage.removeItem('form_portrait_name');
        }

        saveIndexProgress();
      });

      fields.name.addEventListener('input', saveIndexProgress);
      fields.email.addEventListener('input', saveIndexProgress);
      fields.age.addEventListener('change', saveIndexProgress);
      fields.weight.addEventListener('input', saveIndexProgress);
      fields.height.addEventListener('input', saveIndexProgress);

      goToStep2.addEventListener('click', () => {
        saveIndexProgress();
      });

      restoreIndexData();
      saveIndexProgress();
    </script>
  </body>
</html>

<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieTailor</title>
    <style>
      * { box-sizing: border-box; }

      :root {
        --bento-glow-rgb: 150, 110, 70;
        --bento-bg: #1a120c;
        --bento-border: #3b2a1f;
      }

      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: #000;
        color: #fff;
      }

      .hero {
        position: relative;
        isolation: isolate;
        min-height: 50vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        gap: 1px;
        overflow: hidden;
      }

      .hero::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
          url(https://i.postimg.cc/nL3RGjhj/hatteruj-novosz.png);
        background-size: cover;
        background-position: center;
        opacity: 0.6;
        z-index: -2;
      }

      .hero::after { display: none; }

      .shiny-text {
        font-size: clamp(3rem, 6vw, 5.5rem);
        font-weight: 700;
        background: linear-gradient(90deg, #ffffff 0%, #d1d1d1 50%, #ffffff 100%);
        background-size: 200% auto;
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        animation: shine 3s linear infinite;
        letter-spacing: 3px;
  line-height: 1.05;
      }

      .subtitle {
        margin-top: 1.5rem;
        font-size: clamp(1.75rem, 3.5vw, 2.6rem);
        font-weight: 700;
        line-height: 1.2;
      }

      .gradient-text {
        background: linear-gradient(90deg, #9994b0, #c9c8bf);
        background-size: 200% 200%;
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        animation: gradient-flow 8s ease-in-out infinite alternate;
      }

      @keyframes gradient-flow {
        0% { background-position: 0% 50%; }
        100% { background-position: 100% 50%; }
      }

      @keyframes shine {
        to { background-position: 200% center; }
      }

      .form-section {
        position: relative;
        padding: 80px 24px;
        color: #2b2b2b;
        background:
          repeating-linear-gradient(
            90deg,
            rgba(0,0,0,0.015) 0px,
            rgba(0,0,0,0.015) 1px,
            transparent 1px,
            transparent 6px
          ),
          repeating-linear-gradient(
            0deg,
            rgba(0,0,0,0.02) 0px,
            rgba(0,0,0,0.02) 1px,
            transparent 1px,
            transparent 6px
          ),
          linear-gradient(180deg, #f5f1ea, #ebe5dc);
      }

      .form-section::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at 50% 0%, rgba(0,0,0,0.05), transparent 60%);
        opacity: 0.6;
      }

      .container {
        max-width: 1200px;
        margin: 0;
        padding-left: 40px;
      }

      .animated-block {
        background: #fff;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
        transition: transform 0.35s ease, box-shadow 0.35s ease;
      }

      .animated-block:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
      }

      label {
        display: block;
        font-weight: 500;
      }

      .input-style {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ddd;
        margin-top: 6px;
        transition: all 0.3s ease;
        font-size: 1rem;
      }

      .input-style:focus {
        outline: none;
        border-color: #000;
        box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.1);
      }

      .upload-wrap {
        display: flex;
        justify-content: center;
        margin-top: 24px;
        width: 100%;
      }

      .folder-upload {
        background: #2b1d14;
        color: #f5e6d3;
        padding: 14px 0;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 500;
        border: 1px solid rgba(199, 167, 122, 0.35);
        display: block;
        width: 100%;
        text-align: center;
        white-space: nowrap;
      }

      .folder-upload:hover {
        transform: scale(1.05);
        background: #3a2618;
      }

      .filename {
        text-align: center;
        margin-top: 16px;
        font-size: 0.875rem;
        color: #4b5563;
      }

      .layout-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 48px;
      }

      .profile-intro {
        width: min(100%, 500px);
        display: grid;
        gap: 24px;
        flex: 0 0 auto;
      }

      .profile-intro .animated-block {
        width: 100%;
      }

      .triple-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }

      .upload-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        width: 100%;
      }

      .centered-file-name {
        text-align: center;
      }

      .cta-side {
        flex: 1;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        padding-right: 80px;
      }

      .star-button {
        background: #2b1d14;
        color: #f5e6d3;
        padding: 14px 28px;
        border-radius: 12px;
        border: 1px solid rgba(199, 167, 122, 0.35);
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 500;
        font-size: 16px;
        letter-spacing: 0.5px;
        min-width: 240px;
        text-align: center;
      }

      .star-button:hover {
        background: #3a2618;
        transform: scale(1.05);
      }

      .star-button-link {
        text-decoration: none;
      }

      .elegant-progress {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 24px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 0;
        overflow: hidden;
        z-index: 2;
      }

      .elegant-progress .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #c7a77a, #f8f8ff);
        border-top-right-radius: 12px;
        border-bottom-right-radius: 12px;
        border-top-left-radius: 0;
        border-bottom-left-radius: 0;
        transition: width 0.4s ease;
      }

      @media (max-width: 900px) {
        .layout-row {
          flex-direction: column;
          align-items: stretch;
        }

        .cta-side {
          padding-right: 0;
          justify-content: center;
        }
      }

      @media (max-width: 768px) {
        .triple-row,
        .upload-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1 class="shiny-text">MovieTailor</h1>
        <p class="subtitle gradient-text">Fedezd fel a saját vizuális stílusodat.</p>

        <div class="elegant-progress">
          <div class="progress-bar" id="formProgress"></div>
        </div>
      </section>

      <section class="form-section">
        <div class="container layout-row">
          <div class="profile-intro">
            <div class="animated-block">
              <label for="name">Név:</label>
              <input id="name" type="text" class="input-style" />
            </div>

            <div class="animated-block">
              <label for="email">E-mail cím:</label>
              <input id="email" type="email" class="input-style" />
            </div>

            <div class="triple-row">
              <div class="animated-block">
                <label for="age">Életkor:</label>
                <select id="age" class="input-style">
                  <option value="">Válasszon</option>
                  <option>20-35 év</option>
                  <option>36-50 év</option>
                  <option>50+</option>
                </select>
              </div>

              <div class="animated-block">
                <label for="weight">Testsúly:</label>
                <input id="weight" type="number" class="input-style" />
              </div>

              <div class="animated-block">
                <label for="height">Magasság:</label>
                <input id="height" type="number" class="input-style" />
              </div>
            </div>

            <div class="upload-row">
              <div></div>
              <div class="upload-wrap">
                <label class="folder-upload" for="portraitInput">
                  <span>Portré feltöltése</span>
                </label>
                <input id="portraitInput" type="file" hidden />
              </div>
              <div></div>
            </div>

            <p class="filename centered-file-name" id="fileNameText" hidden></p>
          </div>

          <div class="cta-side">
            <a href="step2.html" class="star-button-link" id="goToStep2">
              <button class="star-button">Kérem az elemzést</button>
            </a>
          </div>
        </div>
      </section>
    </main>

    <script>
      const TOTAL_STEPS = 12;
      const portraitInput = document.getElementById('portraitInput');
      const fileNameText = document.getElementById('fileNameText');
      const progressBar = document.getElementById('formProgress');
      const goToStep2 = document.getElementById('goToStep2');

      if (!sessionStorage.getItem('flow_started')) {
        sessionStorage.clear();
        sessionStorage.setItem('flow_started', '1');
      }

      function restoreIndexData() {
        const name = sessionStorage.getItem('form_name') || '';
        const email = sessionStorage.getItem('form_email') || '';
        const age = sessionStorage.getItem('form_age') || '';
        const weight = sessionStorage.getItem('form_weight') || '';
        const height = sessionStorage.getItem('form_height') || '';
        const portraitName = sessionStorage.getItem('form_portrait_name') || '';

        document.getElementById('name').value = name;
        document.getElementById('email').value = email;
        document.getElementById('age').value = age;
        document.getElementById('weight').value = weight;
        document.getElementById('height').value = height;

        if (portraitName) {
          fileNameText.hidden = false;
          fileNameText.textContent = `Feltöltve: ${portraitName}`;
        }
      }

      function saveIndexProgress() {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const age = document.getElementById('age').value.trim();
        const weight = document.getElementById('weight').value.trim();
        const height = document.getElementById('height').value.trim();
        const portraitFilled = sessionStorage.getItem('form_portrait') === '1';

        sessionStorage.setItem('form_name', name);
        sessionStorage.setItem('form_email', email);
        sessionStorage.setItem('form_age', age);
        sessionStorage.setItem('form_weight', weight);
        sessionStorage.setItem('form_height', height);

        let completed = 0;
        if (name) completed++;
        if (email) completed++;
        if (age) completed++;
        if (weight) completed++;
        if (height) completed++;
        if (portraitFilled) completed++;

        sessionStorage.setItem('progress_index_completed', String(completed));

        const stepCompletedTotal = Number(sessionStorage.getItem('progress_step_completed_total') || 0);
        progressBar.style.width = `${((completed + stepCompletedTotal) / TOTAL_STEPS) * 100}%`;
      }

      portraitInput.addEventListener('change', (e) => {
        const file = e.target.files && e.target.files[0];
        const fileName = file ? file.name : '';

        if (fileName) {
          fileNameText.hidden = false;
          fileNameText.textContent = `Feltöltve: ${fileName}`;
          sessionStorage.setItem('form_portrait', '1');
          sessionStorage.setItem('form_portrait_name', fileName);
        } else {
          fileNameText.hidden = true;
          fileNameText.textContent = '';
          sessionStorage.setItem('form_portrait', '0');
          sessionStorage.removeItem('form_portrait_name');
        }

        saveIndexProgress();
      });

      document.getElementById('name').addEventListener('input', saveIndexProgress);
      document.getElementById('email').addEventListener('input', saveIndexProgress);
      document.getElementById('age').addEventListener('change', saveIndexProgress);
      document.getElementById('weight').addEventListener('input', saveIndexProgress);
      document.getElementById('height').addEventListener('input', saveIndexProgress);

      goToStep2.addEventListener('click', saveIndexProgress);

      restoreIndexData();
      saveIndexProgress();
    </script>
  </body>
</html>

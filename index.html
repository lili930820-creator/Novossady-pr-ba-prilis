<!doctype html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MovieTailor</title>

  <style>
    * { box-sizing: border-box; }

    :root {
      --bento-glow-rgb: 150, 110, 70;
      --bento-bg: #1a120c;
      --bento-border: #3b2a1f;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    /* ===== STICKY PROGRESS ===== */
    .sticky-progress-wrapper {
      position: sticky;
      top: 0;
      z-index: 999;
      width: 100%;
      background: rgba(18, 12, 8, 0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(199, 167, 122, 0.22);
    }

    .sticky-progress-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 10px 24px;
    }

    .sticky-progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: rgba(245,230,211,0.8);
      margin-bottom: 6px;
    }

    .sticky-progress-track {
      height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #c7a77a, #f8f8ff);
      transition: width 0.4s ease;
    }

    /* ===== HERO ===== */
    .hero {
      position: relative;
      min-height: 50vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
        url(https://i.postimg.cc/nL3RGjhj/hatteruj-novosz.png);
      background-size: cover;
      background-position: center;
      opacity: 0.6;
      z-index: -1;
    }

    .shiny-text {
      font-size: clamp(3rem, 6vw, 5rem);
      font-weight: 700;
      background: linear-gradient(90deg,#fff,#ccc,#fff);
      -webkit-background-clip: text;
      color: transparent;
    }

    .subtitle {
      margin-top: 12px;
      font-size: 1.6rem;
      color: #ccc;
    }

    /* ===== FORM ===== */
    .form-section {
      background: #f5f1ea;
      color: #2b2b2b;
      padding: 80px 24px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .input-style {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .block {
      margin-bottom: 20px;
    }

    .btn {
      margin-top: 20px;
      padding: 16px;
      background: #2b1d14;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
    }

  </style>
</head>

<body>

<!-- ===== PROGRESS ===== -->
<div class="sticky-progress-wrapper">
  <div class="sticky-progress-inner">
    <div class="sticky-progress-meta">
      <strong>1. lépés / 12</strong>
      <span>Alapadatok</span>
    </div>
    <div class="sticky-progress-track">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>
</div>

<main>

<section class="hero">
  <h1 class="shiny-text">MovieTailor</h1>
  <p class="subtitle">Fedezd fel a saját vizuális stílusodat</p>
</section>

<section class="form-section">
  <div class="container">

    <div class="block">
      <label>Név</label>
      <input id="name" class="input-style">
    </div>

    <div class="block">
      <label>Email</label>
      <input id="email" class="input-style">
    </div>

    <div class="block">
      <label>Életkor</label>
      <select id="age" class="input-style">
        <option></option>
        <option>20-35</option>
        <option>36-50</option>
        <option>50+</option>
      </select>
    </div>

    <div class="block">
      <label>Súly</label>
      <input id="weight" class="input-style">
    </div>

    <div class="block">
      <label>Magasság</label>
      <input id="height" class="input-style">
    </div>

    <a href="step2.html">
      <button class="btn" onclick="save()">Tovább</button>
    </a>

  </div>
</section>

</main>

<script>
const TOTAL = 12;
const bar = document.getElementById("progressBar");

function save(){
  let filled = 0;
  ["name","email","age","weight","height"].forEach(id=>{
    if(document.getElementById(id).value) filled++;
  });

  sessionStorage.setItem("progress_index_completed", filled);

  const step = Number(sessionStorage.getItem("progress_step_completed_total")||0);
  bar.style.width = ((filled+step)/TOTAL*100)+"%";
}

save();
</script>

</body>
</html>

<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieTailor – 2. lépés</title>
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --bento-bg: #1a120c;
        --bento-border: #3b2a1f;
      }

      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: #000;
        color: #fff;
      }

      .hero {
        position: relative;
        isolation: isolate;
        min-height: 58vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        text-align: center;
        padding: 92px 24px 40px;
        gap: 12px;
        overflow: hidden;
      }

      .hero::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.25)),
          url(https://i.postimg.cc/nL3RGjhj/hatteruj-novosz.png);
        background-size: cover;
        background-position: center;
        opacity: 0.6;
        z-index: -2;
      }

      .shiny-text {
        margin: 0;
        font-size: clamp(3rem, 6vw, 5.5rem);
        font-weight: 700;
        background: linear-gradient(90deg, #ffffff 0%, #d1d1d1 50%, #ffffff 100%);
        background-size: 200% auto;
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        animation: shine 3s linear infinite;
        letter-spacing: 3px;
        line-height: 1.05;
      }

      .subtitle {
        margin: 0.5rem 0 0 0;
        font-size: clamp(1.75rem, 3.5vw, 2.6rem);
        font-weight: 600;
        line-height: 1.2;
      }

      .gradient-text {
        background: linear-gradient(90deg, #9994b0, #c9c8bf);
        background-size: 200% 200%;
        color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        animation: gradient-flow 8s ease-in-out infinite alternate;
      }

      @keyframes gradient-flow {
        0% {
          background-position: 0% 50%;
        }
        100% {
          background-position: 100% 50%;
        }
      }

      @keyframes shine {
        to {
          background-position: 200% center;
        }
      }

      .elegant-progress {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 24px;
        background: rgba(255, 255, 255, 0.15);
        overflow: hidden;
        z-index: 2;
      }

      .elegant-progress .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #c7a77a, #f8f8ff);
        border-top-right-radius: 12px;
        border-bottom-right-radius: 12px;
        transition: width 0.4s ease;
      }

      .form-section {
        position: relative;
        padding: 80px 24px;
        color: #2b2b2b;
        background:
          repeating-linear-gradient(
            90deg,
            rgba(0, 0, 0, 0.015) 0px,
            rgba(0, 0, 0, 0.015) 1px,
            transparent 1px,
            transparent 6px
          ),
          repeating-linear-gradient(
            0deg,
            rgba(0, 0, 0, 0.02) 0px,
            rgba(0, 0, 0, 0.02) 1px,
            transparent 1px,
            transparent 6px
          ),
          linear-gradient(180deg, #f5f1ea, #ebe5dc);
      }

      .form-section::before {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at 50% 0%, rgba(0, 0, 0, 0.05), transparent 60%);
        opacity: 0.6;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 24px;
        position: relative;
        z-index: 1;
      }

      .question-section {
        display: grid;
        grid-template-columns: minmax(280px, 1fr) 760px;
        gap: 64px;
        align-items: center;
      }

      .question-text-block {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .question-text-inner {
        width: 100%;
        color: #2b2b2b;
        padding: 12px 0;
      }

      .question-copy-title {
        margin: 0 0 20px 0;
        font-size: clamp(2rem, 2.8vw, 2.7rem);
        font-weight: 700;
        line-height: 1;
        text-align: center;
        letter-spacing: 1.5px;
        color: #241a13;
      }

      .question-copy-text {
        margin: 0;
        font-size: clamp(1.08rem, 1.4vw, 1.28rem);
        line-height: 1.85;
        text-align: center;
        color: #3a342e;
        max-width: 520px;
        margin-inline: auto;
      }

      .question-cards {
        width: 100%;
      }

      .style-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 24px;
        width: 100%;
      }

      .style-card {
        cursor: pointer;
        position: relative;
        padding: 22px 14px 18px;
        border-radius: 22px;
        border: 1px solid rgba(199, 167, 122, 0.18);
        background: linear-gradient(180deg, #22170f 0%, #17100b 100%);
        color: #fff;
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
      }

      .style-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
        border-color: rgba(199, 167, 122, 0.34);
      }

      .style-card.selected {
        border: 1px solid #c7a77a;
        box-shadow:
          0 0 0 1px rgba(199, 167, 122, 0.32),
          0 18px 42px rgba(0, 0, 0, 0.4);
      }

      .img-placeholder {
        width: 78%;
        height: 500px;
        max-width: 460px;
        aspect-ratio: 3 / 4;
        border-radius: 16px;
        margin: 0 auto 16px auto;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.02) 0px,
            rgba(255, 255, 255, 0.02) 1px,
            transparent 1px,
            transparent 4px
          ),
          repeating-linear-gradient(
            0deg,
            rgba(0, 0, 0, 0.15) 0px,
            rgba(0, 0, 0, 0.15) 1px,
            transparent 1px,
            transparent 4px
          ),
          linear-gradient(145deg, #2b1d14, #1a120c);
        border: 1px solid rgba(199, 167, 122, 0.25);
      }

      .img-placeholder img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 16px;
      }

      .card-title {
        text-align: center;
        font-weight: 600;
        font-size: 1.05rem;
        letter-spacing: 0.4px;
        margin: 0;
        color: #f8f4ee;
      }

      .nav-buttons {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 24px;
        margin-top: 56px;
        padding-top: 8px;
      }

      .nav-link {
        text-decoration: none;
      }

      .nav-button {
        background: #2b1d14;
        color: #f5e6d3;
        padding: 15px 30px;
        border-radius: 14px;
        border: 1px solid rgba(199, 167, 122, 0.35);
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 500;
        font-size: 16px;
        letter-spacing: 0.5px;
        min-width: 190px;
        text-align: center;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
      }

      .nav-button:hover {
        background: #3a2618;
        transform: scale(1.05);
      }

      @media (max-width: 1200px) {
        .question-section {
          grid-template-columns: 1fr;
        }

        .question-text-block {
          margin-bottom: 24px;
        }
      }

      @media (max-width: 768px) {
        .hero {
          min-height: 50vh;
          padding: 72px 20px 36px;
          gap: 10px;
        }

        .style-grid {
          grid-template-columns: 1fr;
        }

        .img-placeholder {
          width: 88%;
          height: 400px;
        }

        .nav-buttons {
          flex-direction: column;
        }

        .nav-link,
        .nav-button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1 class="shiny-text">MovieTailor</h1>
        <p class="subtitle gradient-text">Fedezd fel a saját vizuális stílusodat.</p>

        <div class="elegant-progress">
          <div class="progress-bar" id="formProgress"></div>
        </div>
      </section>

      <section class="form-section">
        <div class="container">
          <div class="question-section">
            <div class="question-text-block">
              <div class="question-text-inner">
                <h2 class="question-copy-title">DRAMATURGIA</h2>
                <p class="question-copy-text">
                  Hogyan szeretsz jelen lenni mások előtt?<br /><br />
                  Az egyik megjelenés csendes, visszafogott erőt sugall, a másik
                  erőteljesebb, azonnal észrevehető jelenlétet.<br /><br />
                  Melyik tükrözi jobban azt, ahogyan hatni szeretnél?
                </p>
              </div>
            </div>

            <div class="question-cards">
              <div class="style-grid">
                <div class="style-card" data-group="step2_q1" data-style="visszafogott">
                  <div class="img-placeholder">
                    <img
                      src="https://i.postimg.cc/br8JVF43/Visszafogott-(1).png"
                      alt="Visszafogott"
                    />
                  </div>
                  <p class="card-title">Visszafogott</p>
                </div>

                <div class="style-card" data-group="step2_q1" data-style="karizmatikus">
                  <div class="img-placeholder">
                    <img
                      src="https://i.postimg.cc/3xyK1TdH/Karizmatikus.png"
                      alt="Karizmatikus"
                    />
                  </div>
                  <p class="card-title">Karizmatikus</p>
                </div>
              </div>
            </div>
          </div>

          <div class="nav-buttons">
            <a href="index.html" class="nav-link">
              <button class="nav-button">Vissza</button>
            </a>

            <a href="step3.html" class="nav-link">
              <button class="nav-button">Tovább</button>
            </a>
          </div>
        </div>
      </section>
    </main>

    <script>
      const TOTAL_STEPS = 12;
      const CURRENT_GROUP = 'step2_q1';

      function restoreSelection() {
        const savedValue = sessionStorage.getItem(CURRENT_GROUP);
        if (!savedValue) return;

        const card = document.querySelector(
          `.style-card[data-group="${CURRENT_GROUP}"][data-style="${savedValue}"]`
        );

        if (card) {
          card.classList.add('selected');
        }
      }

      function updateProgress() {
        const selected = document.querySelector(
          `.style-card.selected[data-group="${CURRENT_GROUP}"]`
        );

        if (selected) {
          sessionStorage.setItem(CURRENT_GROUP, selected.dataset.style || '');
        }

        const completedSteps =
          (sessionStorage.getItem('step2_q1') ? 1 : 0) +
          (sessionStorage.getItem('step3_q2') ? 1 : 0) +
          (sessionStorage.getItem('step4_q3') ? 1 : 0) +
          (sessionStorage.getItem('step5_q4') ? 1 : 0) +
          (sessionStorage.getItem('step6_q5') ? 1 : 0) +
          (sessionStorage.getItem('step7_q6') ? 1 : 0);

        sessionStorage.setItem('progress_step_completed_total', String(completedSteps));

        const indexCompleted = Number(
          sessionStorage.getItem('progress_index_completed') || 0
        );

        document.getElementById('formProgress').style.width =
          `${((indexCompleted + completedSteps) / TOTAL_STEPS) * 100}%`;
      }

      document.querySelectorAll('.style-card').forEach((card) => {
        card.addEventListener('click', () => {
          document
            .querySelectorAll(`.style-card[data-group="${CURRENT_GROUP}"]`)
            .forEach((c) => c.classList.remove('selected'));

          card.classList.add('selected');
          updateProgress();
        });
      });

      restoreSelection();
      updateProgress();
    </script>
  </body>
</html>
